server {
  listen 80;
  server_name isc2boulder.ctf www.isc2boulder.ctf;

  return 301 http://www.tastybytes.ctf$request_uri;
}

server {
  listen 80;
  server_name tastybytes.ctf www.tastybytes.ctf localhost;

  root /var/www/html;
  index index.php index.html index.htm;

  error_page 404 /404.html;
  error_page 403 /403.html;

  location = /404.html { 
    root /var/www;
    internal; 
  }
  location = /403.html { 
    root /var/www;
    internal; 
  }

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  location / {
    try_files $uri $uri/ /index.php$query_string;
  }

  location ~ \.php$ {
    try_files $uri =404;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;

    fastcgi_pass php:9000;
    fastcgi_index index.php;

    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param PATH_INFO       $fastcgi_path_info;
  }

  location ~ /\. {
    deny all;
  }

  location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2)$ {
    expires 1d;
    add_header Cache-Control "public, notransform";
  }
  add_header X-Frame-Options        "SAMEORIGIN"    always;
  add_header X-Content-Type-Options "nosniff"       always;
  add_header X-XSS-Protection       "1; mode=block" always;

  location ~* (wp-login|xmlrpc|\.env|\.git) {
    deny all;
    return 404;
  }
}

