
services:
# BIND DNS server stanza
  dns:
    image: ubuntu/bind9:latest
    platform: linux/arm64/v8
    container_name: dns
    restart: always
    user: "100:101"
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      # named.conf files -> /etc/bind/ (read-only)
      - ./bind9/config:/etc/bind:ro
      # Zone data files -> /var/lib/bind/ (read-write for journal files)
      - ./bind9/zones:/var/lib/bind
      # cache files -> /var/cache/bind
      - ./bind9/cache:/var/cache/bind
      # logs -> /var/log
      - ./bind9/logs:/var/log
    security_opt:
      - no-new-privileges:true
    pids_limit: 50            # prevent fork bombs
    mem_limit: 256m           # prevent memory exhaustion
    cpus: "0.5"               # limit CPU abuse
    networks:
      public-vlan:
        ipv4_address: 192.168.1.10
    cap_add:
      - NET_BIND_SERVICE  # allow binding to port 53
    environment:
      - TZ=America/Denver  # adjust to your timezone

#NginX Web server stanza
  webserver:
    image: nginx:alpine
    container_name: webserver
    restart: always
#    user: "101:101"
    ports:
      - "80:80"
#      - "443:443"
    volumes:
      # www files are webroot -> /var/www/html (read only)
      - ./www:/var/www:ro
      # default.conf file -> /etc/nginx/conf.d/default.conf (read-write for service configs)
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro 
      # logs -> /var/log/nginx
      - ./nginx/logs:/var/log/nginx
    tmpfs:
      - /tmp/nginx
    depends_on:
      - php
    security_opt:
      - no-new-privileges:true
    pids_limit: 50            # prevent fork bombs
    mem_limit: 256m           # prevent memory exhaustion
    cpus: "0.5"               # limit CPU abuse
    networks:
      public-vlan:
        ipv4_address: 192.168.1.20

  php:
    build: ./php 
    container_name: php
    restart: always
    user: "82:82"
    volumes:
      # www files are webroot -> /var/www/html (read only)
      - ./www:/var/www:ro
    env_file:
      - .env 
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: '${MYSQL_DATABASE}'
      DB_USERNAME: '${MYSQL_USER}'
      DB_PASSWORD: '${MYSQL_PASSWORD}'
    depends_on:
      mysql:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    pids_limit: 50            # prevent fork bombs
    mem_limit: 256m           # prevent memory exhaustion
    cpus: "0.5"               # limit CPU abuse
    networks:
      public-vlan:
        ipv4_address: 192.168.1.12
      internal:

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    env_file:
       - .env
    environment:
      MYSQL_DATABASE: '${MYSQL_DATABASE}'
      MYSQL_USER: '${MYSQL_USER}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD}'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
#    ports:
#      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d  
      - ./mysql/csv:/var/lib/mysql-files:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    pids_limit: 50            # prevent fork bombs
    mem_limit: 256m           # prevent memory exhaustion
    cpus: "0.5"               # limit CPU abuse
    networks:
      - internal

volumes:
  db-data:

networks:
  public-vlan:
    driver: ipvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1
  internal:
    driver: bridge
    internal: true

